<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Cronloop architecture</title>
  <desc id="desc">A short user request becomes a bounded prompt, a guarded cron wake-up, an exact Codex thread resume, and verified self-removal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#111d35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#65d7c1"/>
      <stop offset="1" stop-color="#67a6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#71b7ff"/>
    </marker>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="64" fill="#f5f8ff" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="700">Cronloop: an agent-aware scheduler for Codex CLI</text>
  <text x="64" y="94" fill="#93a7c7" font-family="Inter,Segoe UI,sans-serif" font-size="16">One evidence-driven round per wake-up. Exact thread. Explicit completion.</text>

  <g filter="url(#shadow)" font-family="Inter,Segoe UI,sans-serif">
    <rect x="64" y="150" width="202" height="132" rx="18" fill="#172641" stroke="#2d466e"/>
    <circle cx="100" cy="188" r="18" fill="#67a6ff"/>
    <path d="M92 188h16M100 180v16" stroke="#07111f" stroke-width="3" stroke-linecap="round"/>
    <text x="86" y="232" fill="#f5f8ff" font-size="19" font-weight="700">Short request</text>
    <text x="86" y="258" fill="#9fb0cb" font-size="14">“Poll every 30m”</text>

    <rect x="332" y="150" width="240" height="132" rx="18" fill="#172641" stroke="#2d466e"/>
    <rect x="358" y="174" width="40" height="40" rx="9" fill="#65d7c1"/>
    <path d="M368 187h20M368 195h14M368 203h17" stroke="#07111f" stroke-width="3" stroke-linecap="round"/>
    <text x="358" y="232" fill="#f5f8ff" font-size="19" font-weight="700">Bounded contract</text>
    <text x="358" y="258" fill="#9fb0cb" font-size="14">checks · authority · stop</text>

    <rect x="638" y="150" width="216" height="132" rx="18" fill="#172641" stroke="#2d466e"/>
    <circle cx="674" cy="194" r="21" fill="#f7c96b"/>
    <path d="M674 181v13l9 6" fill="none" stroke="#07111f" stroke-width="3" stroke-linecap="round"/>
    <text x="664" y="232" fill="#f5f8ff" font-size="19" font-weight="700">Guarded cron</text>
    <text x="664" y="258" fill="#9fb0cb" font-size="14">lock · window · timeout</text>

    <rect x="920" y="150" width="216" height="132" rx="18" fill="#172641" stroke="#2d466e"/>
    <circle cx="956" cy="194" r="21" fill="#b49cff"/>
    <path d="M946 198c4-14 16-14 20 0M951 185h10" fill="none" stroke="#07111f" stroke-width="3" stroke-linecap="round"/>
    <text x="946" y="232" fill="#f5f8ff" font-size="19" font-weight="700">Exact thread</text>
    <text x="946" y="258" fill="#9fb0cb" font-size="14">codex exec resume UUID</text>
  </g>

  <g stroke="#71b7ff" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M274 216h44"/>
    <path d="M580 216h44"/>
    <path d="M862 216h44"/>
  </g>

  <g font-family="Inter,Segoe UI,sans-serif">
    <rect x="246" y="350" width="708" height="130" rx="22" fill="#0d172a" stroke="#31517b" stroke-width="2"/>
    <rect x="246" y="350" width="8" height="130" rx="4" fill="url(#accent)"/>
    <text x="286" y="391" fill="#f5f8ff" font-size="20" font-weight="700">One scheduled round</text>
    <text x="286" y="422" fill="#a7b7d1" font-size="15">inspect evidence → report health/progress → recover only within authority</text>
    <text x="286" y="451" fill="#65d7c1" font-size="15" font-weight="600">completion verified → remove only this job's marked cron block</text>
    <path d="M1028 282v133H970" fill="none" stroke="#71b7ff" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M246 415H156V216h-72" fill="none" stroke="#3f6c9f" stroke-width="2" stroke-dasharray="7 7"/>
    <text x="64" y="526" fill="#7187a8" font-size="13">if incomplete: exit now and wait for the next cron tick</text>
  </g>
</svg>
